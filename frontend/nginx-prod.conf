# Static SPA serving for the SINARMS frontend container.
# TLS, gzip-at-edge and the public hostname are handled by the CloudPanel
# reverse proxy / Cloudflare in front of this container. Here we only serve the
# built assets and fall back to index.html for client-side routes.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed build assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA client-side routing: unknown paths return index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
