name: Deploy ai

on:
  push:
    branches: [main]
    paths:
      - "ai/**"
      - "docker-compose.prod.yml"
      - ".github/workflows/deploy-ai.yml"
  workflow_dispatch:

concurrency:
  group: deploy-ai
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 98.83.16.194
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/sinarms
            # --force + FETCH_HEAD: survive a locked/corrupted origin/* ref
            # (CloudPanel box has hit this) instead of failing the deploy.
            git fetch --prune --force origin main || { git remote prune origin || true; git fetch --force origin main; }
            git reset --hard FETCH_HEAD
            docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build ai
            docker image prune -f
      - name: Health check
        run: |
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" https://ai-sinarms.isiri.rw/healthz || true)
            echo "attempt $i -> $code"
            [ "$code" = "200" ] && exit 0
            sleep 6
          done
          echo "ai health check failed"; exit 1
